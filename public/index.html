<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High School Planner AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fcd7ac; --card: #fff8f0; --border: #fcd7ac;
      --accent: #f07830; --accent-light: #fcd7ac; --accent-muted: #f8c49a;
      --text: #2d1f0e; --text-soft: #8a6e57; --input-bg: #fff; --radius: 12px;
    }
    body { background: var(--bg); font-family: 'Sora', sans-serif; color: var(--text); min-height: 100vh; padding: 36px 16px 60px; }
    .container { max-width: 600px; margin: 0 auto; }
    header { margin-bottom: 28px; }
    header h1 { font-family: 'DM Serif Display', serif; font-size: 1.9rem; color: var(--accent); margin-bottom: 5px; }
    header p { font-size: 0.85rem; color: var(--text-soft); font-weight: 300; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 20px; margin-bottom: 14px; }
    .section-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.8rem; color: var(--text-soft); margin-bottom: 4px; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; font-family: 'Sora', sans-serif;
      font-size: 0.85rem; color: var(--text); outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent-muted); }
    .field textarea { resize: vertical; min-height: 68px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 0.76rem; cursor: pointer; background: var(--input-bg); color: var(--text-soft); transition: all 0.12s; user-select: none; }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'Sora', sans-serif; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #output-card { display: none; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 20px; margin-top: 14px; }
    #output-card h2 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: var(--accent); margin-bottom: 14px; }
    #output-content { font-size: 0.84rem; line-height: 1.75; color: var(--text); }
    #output-content table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.8rem; }
    #output-content th { background: var(--accent-light); color: var(--accent); padding: 7px 9px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
    #output-content td { padding: 6px 9px; border: 1px solid var(--border); }
    #output-content tr:nth-child(even) td { background: #fdf0e5; }
    #output-content strong { color: var(--accent); }
    #output-content h3 { margin: 12px 0 5px; font-size: 0.88rem; }
    .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff6; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 7px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #c0392b; font-size: 0.8rem; margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>High School Planner AI</h1>
  </header>

  <div class="card">
    <div class="section-label">About You</div>
    <div class="row-2">
      <div class="field">
        <label>Current Grade</label>
        <select id="grade">
          <option value="8">8th (entering HS)</option>
          <option value="9" selected>9th Grade</option>
          <option value="10">10th Grade</option>
          <option value="11">11th Grade</option>
        </select>
      </div>
      <div class="field">
        <label>Current GPA</label>
        <select id="gpa">
          <option value="below 2.5">Below 2.5</option>
          <option value="2.5–3.0">2.5 – 3.0</option>
          <option value="3.0–3.5">3.0 – 3.5</option>
          <option value="3.5–3.9" selected>3.5 – 3.9</option>
          <option value="4.0+">4.0 +</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Dream Career / Major</label>
      <input id="major" type="text" placeholder="e.g. Computer Science, Nursing, Film, Business…" />
    </div>
    <div class="field">
      <label>College Goal</label>
      <select id="collegeGoal">
        <option value="community college">Community College</option>
        <option value="Cal State / state school" selected>Cal State / State School</option>
        <option value="UC system">UC System</option>
        <option value="private / top 50">Private / Top 50</option>
        <option value="Ivy League / elite">Ivy League / Elite</option>
        <option value="not sure yet">Not Sure Yet</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Academics</div>
    <div class="row-2">
      <div class="field">
        <label>AP Classes Wanted</label>
        <select id="APs">
          <option value="0">0 — not interested</option>
          <option value="1–2" selected>1–2 per year</option>
          <option value="3–4">3–4 per year</option>
          <option value="5+">5+ per year</option>
        </select>
      </div>
      <div class="field">
        <label>Honors Classes?</label>
        <select id="honors">
          <option value="yes, as many as possible">As many as possible</option>
          <option value="yes, a few" selected>Yes, a few</option>
          <option value="no preference">No preference</option>
          <option value="no, standard only">No, standard only</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Strong Subjects</label>
      <div class="chips" id="strongSubjects">
        <span class="chip" data-val="Math">Math</span>
        <span class="chip" data-val="Science">Science</span>
        <span class="chip" data-val="English">English</span>
        <span class="chip" data-val="History">History</span>
        <span class="chip" data-val="Art">Art</span>
        <span class="chip" data-val="Languages">Languages</span>
        <span class="chip" data-val="PE / Sports">PE</span>
        <span class="chip" data-val="Computer Science">CS</span>
      </div>
    </div>
    <div class="field">
      <label>Weak / Disliked Subjects</label>
      <div class="chips" id="weakSubjects">
        <span class="chip" data-val="Math">Math</span>
        <span class="chip" data-val="Science">Science</span>
        <span class="chip" data-val="English">English</span>
        <span class="chip" data-val="History">History</span>
        <span class="chip" data-val="Art">Art</span>
        <span class="chip" data-val="Languages">Languages</span>
        <span class="chip" data-val="PE / Sports">PE</span>
        <span class="chip" data-val="Computer Science">CS</span>
      </div>
    </div>
    <div class="field">
      <label>Course Catalog (.txt, optional)</label>
      <input id="courseCatalog" type="file" accept=".txt" />
    </div>
  </div>

  <div class="card">
    <div class="section-label">Notes</div>
    <div class="field">
      <label>Anything else we should know?</label>
      <textarea id="notes" placeholder="e.g. I struggle with time management, interested in dual enrollment, want to study abroad…"></textarea>
    </div>
  </div>

  <button class="btn" onclick="generate()" id="genBtn">Generate My Plan</button>
  <p class="error-msg" id="errorMsg"></p>

  <div id="output-card">
    <h2>Your High School Plan</h2>
    <div id="output-content"></div>
  </div>
</div>

<script>
  document.querySelectorAll('.chips').forEach(group => {
    group.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => chip.classList.toggle('active'));
    });
  });

  function getChips(groupId) {
    return [...document.querySelectorAll(`#${groupId} .chip.active`)]
      .map(c => c.dataset.val).join(', ') || 'none selected';
  }

  async function generate() {
    const btn = document.getElementById('genBtn');
    const errorEl = document.getElementById('errorMsg');
    const outputCard = document.getElementById('output-card');
    const outputContent = document.getElementById('output-content');
    errorEl.textContent = '';

    const grade = document.getElementById('grade').value;
    const gpa = document.getElementById('gpa').value;
    const major = document.getElementById('major').value.trim() || 'undecided';
    const collegeGoal = document.getElementById('collegeGoal').value;
    const APs = document.getElementById('APs').value;
    const honors = document.getElementById('honors').value;
    const strongSubjects = getChips('strongSubjects');
    const weakSubjects = getChips('weakSubjects');
    const notes = document.getElementById('notes').value.trim();
    const catalogFile = document.getElementById('courseCatalog').files[0];

    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>Building your plan…';

    const prompt = `Create a personalized high school course plan for this student. Use HTML table tags for the schedule and <strong> for emphasis. No markdown.

Student Profile:
- Current grade: ${grade}th grade
- GPA: ${gpa}
- Dream career / major: ${major}
- College goal: ${collegeGoal}
- AP classes wanted: ${APs}
- Honors classes: ${honors}
- Strong subjects: ${strongSubjects}
- Weak / disliked subjects: ${weakSubjects}
- Additional notes: ${notes || 'none'}

Please provide:
1. A year-by-year HTML course table from their current grade through 12th grade (columns: Year, Core Classes, Electives, AP/Honors)
2. 3–5 short strategic tips tailored to their goals
3. A short motivational closer`;

    try {
      const formData = new FormData();
      formData.append('prompt', prompt);
      if (catalogFile) formData.append('catalog', catalogFile);

      const res = await fetch('/api/plan', {
        method: 'POST',
        body: formData  // no Content-Type header — browser sets it automatically with boundary
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      outputContent.innerHTML = data.text;
      outputCard.style.display = 'block';
      outputCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      errorEl.textContent = 'Error: ' + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Generate My Plan';
    }
  }
</script>
</body>
</html>
